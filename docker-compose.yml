version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autofix_backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: autofix_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend