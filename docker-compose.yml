version: "3.9"

services:

  backend:
    build: .
    container_name: autofix_backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: autofix_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"